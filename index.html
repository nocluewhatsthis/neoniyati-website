<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoNiyati</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0f0e0d;
  --ink-muted: #5a5750;
  --ink-faint: #9a9590;
  --cream: #f7f5f0;
  --cream-dark: #ede9e0;
  --gold: #b8935a;
  --white: #ffffff;
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--white);
  color: var(--ink);
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  height: 68px;
  background: rgba(255,255,255,0.95);
  border-bottom: 0.5px solid rgba(15,14,13,0.1);
}

/* NEW LOGO — Variation B */
.b-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.b-wl {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 24px;
  color: var(--ink);
}

.b-wl .neo {
  font-style: italic;
  font-weight: 600;
}

.b-wl .niy {
  font-style: normal;
  font-weight: 400;
}

.b-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold);
  margin-top: 2px;
}

.nav-links {
  display: flex;
  gap: 36px;
}

.nav-links a {
  font-size: 13px;
  color: var(--ink-muted);
  text-decoration: none;
}

.nav-cta {
  padding: 8px 20px;
  background: var(--ink);
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  background: var(--cream);
  padding: 120px 48px;
}

.hero h1 {
  font-family: var(--serif);
  font-size: 64px;
  font-weight: 400;
}

.hero em {
  color: var(--gold);
}

.hero-sub {
  margin-top: 20px;
  color: var(--ink-muted);
}

.btn-primary {
  margin-top: 20px;
  display: inline-block;
  padding: 12px 28px;
  background: var(--ink);
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#">
    <span class="b-wrap">
      <span class="b-wl">
        <span class="neo">Neo</span><span class="niy">Niyati</span>
      </span>
      <span class="b-dot"></span>
    </span>
  </a>

  <div class="nav-links">
    <a href="#what">What we do</a>
    <a href="#how">How we work</a>
    <a href="#who">Who we work with</a>
    <a href="#about">About</a>
    <a class="nav-cta" href="#contact">Get in touch</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>
      The right people for<br>
      <em>the right roles.</em>
    </h1>

    <p class="hero-sub">
      Working with in-house legal teams and law firms to build stronger, more thoughtfully matched teams.
    </p>

    <a class="btn-primary" href="#contact">Get in touch</a>
  </div>
</section>

</body>
</html>
